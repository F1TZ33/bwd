<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Order Capture</title>
  <link href="assets/css/style.css" rel="stylesheet"/>

  <style>
    body{
      padding-top:max(0px, env(safe-area-inset-top));
      padding-bottom:max(28px, calc(env(safe-area-inset-bottom) + 18px));
    }

    .orderCard{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.10);
      border-radius:20px;
      padding:18px;
      box-shadow:0 14px 32px rgba(0,0,0,.16);
    }

    .orderTopGrid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
      margin-bottom:16px;
    }

    .orderRows{
      display:grid;
      gap:12px;
    }

    .orderRow{
      display:grid;
      grid-template-columns:minmax(0,1fr) 110px 54px;
      grid-template-areas:
        "part qty remove"
        "scan scan scan";
      gap:10px;
      padding:12px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      background:rgba(255,255,255,.02);
    }

    .orderPartBlock{ grid-area:part; }
    .orderQtyBlock{ grid-area:qty; }
    .orderRemoveBlock{ grid-area:remove; }
    .orderScanWrap{ grid-area:scan; }

    /* 🔥 MATCH HEIGHTS */
    .field input,
    .orderScanBtn,
    .orderMiniBtn{
      height:48px;
      min-height:48px;
      box-sizing:border-box;
    }

    .field input{
      padding:0 14px;
      border-radius:12px;
    }

    .orderScanBtn,
    .orderMiniBtn{
      border-radius:12px;
      border:1px solid rgba(198,40,40,.28);
      background:linear-gradient(180deg, rgba(198,40,40,.12), rgba(198,40,40,.06));
      font-weight:800;
      color:var(--text);
      cursor:pointer;
      width:100%;
    }

    .orderRemoveBtn{
      min-width:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }

    .orderBottom{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-top:16px;
      gap:12px;
    }

    @media (max-width:980px){
      .orderTopGrid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
    }

    @media (max-width:760px){
      .orderTopGrid{
        grid-template-columns:1fr;
      }

      .orderRow{
        grid-template-columns:1fr 90px;
        grid-template-areas:
          "part part"
          "qty remove"
          "scan scan";
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="siteHeader">
      <img class="siteLogo" src="assets/img/logo.png"/>
    </div>

    <div class="topbar">
      <a class="btn" href="index.html">⤒ Dashboard</a>
    </div>

    <section class="heroPanel">
      <h1>Order Capture</h1>
    </section>

    <section class="orderCard">

      <div class="orderTopGrid">
        <div class="field"><label>Company</label><input id="companyName"></div>
        <div class="field"><label>Customer</label><input id="customerName"></div>
        <div class="field"><label>Email</label><input id="customerEmail"></div>
        <div class="field"><label>Date</label><input id="orderDate" type="date"></div>
        <div class="field"><label>Reference</label><input id="orderReference"></div>
      </div>

      <h3>Items</h3>
      <div class="orderRows" id="orderRows"></div>

      <div class="orderBottom">
        <button id="addRowBtn" class="smallbtn">Add another line</button>
        <button id="completeBtn" class="btn">Complete</button>
      </div>

    </section>
  </div>
