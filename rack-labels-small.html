<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Small QR Labels — 61 × 22mm / 30 per A4</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<style>
  :root{
    --page-w:210mm;
    --page-h:297mm;
    --label-w:61mm;
    --label-h:22mm;
    --qr:18mm;
    --left:13.5mm;
    --top:13.5mm;
    --pitch-x:61mm;
    --pitch-y:22mm;
    --cols:3;
    --rows:10;
    --part:7.8pt;
    --desc:5.8pt;
    --pad-x:1.2mm;
    --pad-y:1mm;
    --gap:1.2mm;
  }

  html,body{
    margin:0;
    padding:0;
    background:#0b1830;
    color:#111;
    font-family:Arial,Helvetica,sans-serif;
  }

  .screenBar{
    padding:14px 18px;
    background:#0b1830;
    color:#fff;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    border-bottom:1px solid rgba(255,255,255,.14);
  }

  .screenBar .actions{display:flex;gap:8px;flex-wrap:wrap;}
  .screenBar button{
    font-weight:800;
    border:1px solid #fff;
    border-radius:8px;
    background:#fff;
    color:#0b1830;
    padding:8px 12px;
    cursor:pointer;
  }

  .screenHint{
    display:block;
    font-size:12px;
    opacity:.85;
    margin-top:4px;
  }

  #screenRoot{
    padding:18px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
    gap:12px;
    background:#0b1830;
  }

  .previewLabel{
    background:#fff;
    border-radius:10px;
    padding:10px;
    display:grid;
    grid-template-columns:96px 1fr 30px;
    align-items:center;
    gap:12px;
    min-height:104px;
    box-shadow:0 4px 14px rgba(0,0,0,.22);
  }

  .previewQr{
    width:96px;
    height:96px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .previewQr canvas{width:96px!important;height:96px!important;}

  .previewPart{
    font-weight:900;
    color:#0b1830;
    font-size:18px;
    line-height:1.05;
    word-break:break-word;
    overflow-wrap:anywhere;
  }

  .previewDesc{
    margin-top:5px;
    color:#111;
    font-size:13px;
    font-weight:700;
    line-height:1.1;
  }

  .previewCheck input{
    width:20px;
    height:20px;
  }

  #printRoot{
    display:none;
  }

  .printSheet{
    position:relative;
    width:210mm;
    height:297mm;
    margin:0;
    padding:0;
    background:#fff;
    overflow:hidden;
    break-after:page;
    page-break-after:always;
  }

  .printSheet:last-child{
    break-after:auto;
    page-break-after:auto;
  }

  .printLabel{
    position:absolute;
    width:var(--label-w);
    height:var(--label-h);
    box-sizing:border-box;
    display:grid;
    grid-template-columns:var(--qr) 1fr;
    column-gap:var(--gap);
    align-items:center;
    padding:var(--pad-y) var(--pad-x);
    background:#fff;
    overflow:hidden;
  }

  .qrWrap{
    position:relative;
    width:var(--qr);
    height:var(--qr);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:#fff;
  }

  .qrWrap canvas{
    width:var(--qr)!important;
    height:var(--qr)!important;
    display:block;
  }

  .labelText{
    min-width:0;
    overflow:hidden;
    align-self:center;
  }

  .part{
    font-size:var(--part);
    line-height:1.02;
    font-weight:900;
    color:#0b1830;
    white-space:normal;
    word-break:break-word;
    overflow-wrap:anywhere;
    overflow:hidden;
  }

  .desc{
    margin-top:.75mm;
    font-size:var(--desc);
    line-height:1.05;
    font-weight:700;
    color:#111;
    white-space:normal;
    word-break:break-word;
    overflow-wrap:anywhere;
    overflow:hidden;
  }

  .error{
    color:#fff;
    padding:20px;
    font-size:16px;
  }

  @page{
    size:A4 portrait;
    margin:0;
  }

  @media print{
    html,body{
      margin:0!important;
      padding:0!important;
      width:210mm!important;
      min-width:210mm!important;
      max-width:210mm!important;
      background:#fff!important;
      -webkit-print-color-adjust:exact;
      print-color-adjust:exact;
    }

    .screenBar,#screenRoot{
      display:none!important;
    }

    #printRoot{
      display:block!important;
      width:210mm!important;
      margin:0!important;
      padding:0!important;
      background:#fff!important;
    }

    .printSheet{
      width:210mm!important;
      height:297mm!important;
      margin:0!important;
      padding:0!important;
      box-shadow:none!important;
      transform:none!important;
      zoom:1!important;
    }
  }
</style>
</head>
<body>
<div class="screenBar">
  <div>
    <strong>Small QR Labels — 61 × 22mm / 30 per A4</strong>
    <span class="screenHint">Use Print Selected. In the print dialog choose A4, Portrait, Scale 100%, Margins None, Headers/Footers Off.</span>
  </div>
  <div class="actions">
    <button type="button" onclick="toggleAll(true)">Select All</button>
    <button type="button" onclick="toggleAll(false)">Clear All</button>
    <button type="button" onclick="printSelected()">Print Selected</button>
  </div>
</div>

<div id="screenRoot"></div>
<div id="printRoot"></div>

<script>
(function(){
  const screenRoot=document.getElementById('screenRoot');
  const printRoot=document.getElementById('printRoot');
  const perPage=30;
  const cols=3;
  let labelRows=[];

  function escapeHtml(v){
    return String(v??'')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function drawBwLogoOnQr(canvas){
    const ctx=canvas.getContext('2d');
    const size=canvas.width;
    const box=size*0.27;
    const r=box/2;
    const cx=size/2;
    const cy=size/2;

    ctx.save();
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fill();

    ctx.lineWidth=Math.max(3,size*0.024);
    ctx.strokeStyle='#d80b25';
    ctx.beginPath();
    ctx.arc(cx,cy,r*0.82,0,Math.PI*2);
    ctx.stroke();

    ctx.fillStyle='#0b2c6b';
    ctx.font='900 '+Math.round(box*0.34)+'px Arial, Helvetica, sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('BW',cx,cy+box*0.025);
    ctx.restore();
  }

  async function makeQr(target,value,screen){
    const canvas=document.createElement('canvas');
    target.appendChild(canvas);

    const size=screen ? 144 : 220;

    if(window.QRCode&&typeof window.QRCode.toCanvas==='function'){
      await window.QRCode.toCanvas(canvas,value,{width:size,margin:1,errorCorrectionLevel:'H'});
    }else if(window.QRious){
      new QRious({element:canvas,value:value,size:size,padding:4,level:'H'});
    }else{
      throw new Error('QR library not available');
    }

    drawBwLogoOnQr(canvas);
  }

  function autoScalePrint(label){
    const part=label.querySelector('.part');
    const desc=label.querySelector('.desc');
    if(!part)return;

    const len=(part.textContent||'').trim().length;
    let base=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--part'))||8;

    if(len>12) base*=0.92;
    if(len>16) base*=0.84;
    if(len>22) base*=0.74;
    if(len>30) base*=0.64;
    if(len>38) base*=0.56;

    part.style.fontSize=base+'pt';

    if(desc){
      const dlen=(desc.textContent||'').trim().length;
      let d=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--desc'))||6;
      if(dlen>24)d*=0.92;
      if(dlen>36)d*=0.82;
      if(dlen>48)d*=0.72;
      desc.style.fontSize=d+'pt';
    }
  }

  function positionLabel(label,index){
    const col=index%cols;
    const row=Math.floor(index/cols);
    label.style.left='calc(var(--left) + '+col+' * var(--pitch-x))';
    label.style.top='calc(var(--top) + '+row+' * var(--pitch-y))';
  }

  window.toggleAll=function(state){
    document.querySelectorAll('.printSelect').forEach(cb=>cb.checked=state);
  };

  async function renderScreen(){
    screenRoot.innerHTML='';
    labelRows.forEach(async function(row,index){
      const card=document.createElement('div');
      card.className='previewLabel';
      card.innerHTML='<div class="previewQr"></div><div><div class="previewPart">'+escapeHtml(row.part||'')+'</div><div class="previewDesc">'+escapeHtml(row.desc||'')+'</div></div><label class="previewCheck"><input type="checkbox" class="printSelect" data-index="'+index+'" checked></label>';
      screenRoot.appendChild(card);
      await makeQr(card.querySelector('.previewQr'),String(row.part||''),true);
    });
  }

  async function buildPrintSheets(rows){
    printRoot.innerHTML='';

    const pages=Math.ceil(rows.length/perPage);
    for(let page=0;page<pages;page++){
      const sheet=document.createElement('section');
      sheet.className='printSheet';
      printRoot.appendChild(sheet);

      const pageRows=rows.slice(page*perPage,(page+1)*perPage);
      for(let i=0;i<pageRows.length;i++){
        const row=pageRows[i];
        const label=document.createElement('div');
        label.className='printLabel';
        positionLabel(label,i);
        label.innerHTML='<div class="qrWrap"></div><div class="labelText"><div class="part" style="font-size:'+(row.partFont||'')+'">'+escapeHtml(row.part||'')+'</div><div class="desc" style="font-size:'+(row.descFont||'')+'">'+escapeHtml(row.desc||'')+'</div></div>';
        sheet.appendChild(label);
        await makeQr(label.querySelector('.qrWrap'),String(row.part||''),false);
        
      }
    }
  }

  window.printSelected=async function(){
    const selected=[];
    document.querySelectorAll('.printSelect').forEach(function(cb){
      if(cb.checked){
        const idx=parseInt(cb.dataset.index,10);
        if(labelRows[idx]) selected.push(labelRows[idx]);
      }
    });

    if(!selected.length){
      alert('No labels selected.');
      return;
    }

    await buildPrintSheets(selected);

    setTimeout(function(){
      window.print();
    },100);
  };

  async function init(){
    let payload=null;
    try{payload=JSON.parse(sessionStorage.getItem('bwRackQrPrintData')||'null');}catch(e){}
    labelRows=(payload&&Array.isArray(payload.rows))?payload.rows:[];

    if(!labelRows.length){
      screenRoot.innerHTML='<div class="error">No label data found. Return to Rack Builder and generate QR labels again.</div>';
      return;
    }

    await renderScreen();
  }

  window.addEventListener('afterprint',function(){
    printRoot.innerHTML='';
  });

  init();
})();
</script>
</body>
</html>
