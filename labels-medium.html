<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Medium Avery Labels</title>
<style>
@page { size:A4; margin:0; }
body{
  margin:0;
  padding:8mm;
  font-family:Arial,sans-serif;
}
.sheet{
  display:grid;
  grid-template-columns:repeat(2,90mm);
  grid-auto-rows:40mm;
  gap:2mm;
}
.label{
  width:90mm;
  height:40mm;
  display:flex;
  align-items:center;
  gap:4mm;
  padding:2mm;
  border:1px solid #ddd;
}
.qr{
  width:32mm;
  height:32mm;
}
.part{
  font-size:16pt;
  font-weight:bold;
}
.desc{
  font-size:10pt;
}
</style>
</head>
<body>
<div class="sheet">
  <div class="label">
    <img class="qr" src="bw-qr-placeholder.png">
    <div>
      <div class="part">6205-2RS</div>
      <div class="desc">Deep Groove Bearing</div>
    </div>
  </div>
</div>
</body>
</html>
