<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Small Avery Labels</title>
<style>
@page { size:A4; margin:0; }
body{
  margin:0;
  padding:6mm;
  font-family:Arial,sans-serif;
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}
*{ box-sizing:border-box; }

.sheet{
  display:grid;
  grid-template-columns:repeat(3,61mm);
  grid-auto-rows:22mm;
  gap:0;
}

.label{
  width:61mm;
  height:22mm;
  display:flex;
  align-items:center;
  gap:2mm;
  padding:1mm;
  overflow:hidden;
}

.qr{
  width:18mm;
  height:18mm;
  flex-shrink:0;
}

.text{
  display:flex;
  flex-direction:column;
  justify-content:center;
  width:38mm;
}

.part{
  font-size:10pt;
  font-weight:700;
  line-height:1;
}

.desc{
  font-size:7pt;
  line-height:1;
}
</style>

<style id="bwUniversalFooterSignatureStyle">
.siteSignature{width:100%;text-align:center;font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.22);padding:18px 10px 12px;margin-top:auto;user-select:none;pointer-events:none;text-transform:uppercase;font-weight:600}.siteSignature::after{content:'Designed and built by H. Fitzgerald'}@media print{.siteSignature{position:fixed;bottom:4mm;right:6mm;width:auto;font-size:6px;color:rgba(0,0,0,.30)!important;padding:0;margin:0;text-align:right}}
</style>
</head>
<body>
<div class="sheet">
  <div class="label">
    <img class="qr" src="bw-qr-placeholder.png">
    <div class="text">
      <div class="part">6205-2RS</div>
      <div class="desc">Deep Groove Bearing</div>
    </div>
  </div>
</div>
<footer class="siteSignature" aria-label="Designed and built by H. Fitzgerald" data-build-credit="H. Fitzgerald"></footer>
</body>
</html>
